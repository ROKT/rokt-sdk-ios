# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
  sha256:
    darwin_arm64: 2cff4f1cc63916db290359a058b88167beeac07a496682d9307a1804b498f225
    darwin_x86_64: d0153b87a7eba4cd7d09a048b97bd60ac3ac15352def2bc3599d548875823ed3
    linux_x86_64: 3845ff76a70cebb10e61a267ff719ffdccfa3ef6d877d51870a2c62b79603ab9
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: rokt-trunk-plugin
      ref: main
      uri: https://github.com/ROKT/rokt-workflows
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - bandit@1.9.4
    - black@26.3.1
    - isort@8.0.1
    - ruff@0.15.12
    - validate-actions-versions
    - checkov@3.2.527
    - osv-scanner@2.3.8
    - trufflehog@3.95.2
    - swiftformat@0.61.1
    - git-diff-check
    - markdownlint@0.48.0
    - oxipng@10.1.1
    - prettier@3.8.3
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.1
    - swiftlint@0.63.2
    - actionlint@1.7.12
    - yamllint@1.38.0
  ignore:
    - linters: [ALL]
      paths:
        - Tests/RoktUXHelperTests/Supporting Files
        - Example/Example/Resources
actions:
  enabled:
    - trunk-check-pre-push
    - trunk-announce
    - trunk-fmt-pre-commit
    - trunk-check-pre-commit
    - trunk-upgrade-available
