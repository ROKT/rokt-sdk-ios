project: Example/rokt.xcodeproj
schemes:
  - rokt-Example
skip_build: true
index_store_path: DerivedData-periphery/Index.noindex/DataStore
retain_public: true
baseline: periphery-baseline.json
relative_results: true
strict: true
exclude_tests: true
exclude_targets:
  # Local SPM packages: Example does not exercise most of their surface; Periphery
  # would otherwise report the whole dependency tree as unused/redundant.
  - RoktUXHelper
  - RoktUXHelperTests
  - RoktPaymentExtension
  - RoktPaymentExtensionTests
