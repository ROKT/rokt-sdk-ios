name: PaymentSampleApp
options:
  bundleIdPrefix: com.rokt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

packages:
  Rokt-Widget:
    path: ..
  rokt-stripe-payment-extension-ios:
    url: https://github.com/ROKT/rokt-stripe-payment-extension-ios.git
    branch: feat/shoppable-ads-contracts

targets:
  PaymentSampleApp:
    type: application
    platform: iOS
    sources:
      - PaymentSampleApp
    dependencies:
      - package: Rokt-Widget
        product: Rokt-Widget
      - package: rokt-stripe-payment-extension-ios
        product: RoktStripePaymentExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rokt.PaymentSampleApp
        DEVELOPMENT_TEAM: EX8W57PJ9C
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PaymentSampleApp/PaymentSampleApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_VERSION: "5.0"
