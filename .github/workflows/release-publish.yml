name: Release – Publish

on:
  push:
    branches:
      - main
      - maintenance/*
    paths:
      - VERSION
      - CHANGELOG.md

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  detect:
    name: Detect ecosystem release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.diff.outputs.release }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Diff root VERSION
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          RELEASE=false
          BASE="${{ github.event.before }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-parse HEAD^ 2>/dev/null || true)
          fi
          if [[ -n "$BASE" ]]; then
            FILES=$(git diff --name-only "$BASE" "${{ github.sha }}" || true)
            echo "$FILES"
            while IFS= read -r line; do
              [[ "$line" == "VERSION" ]] && RELEASE=true
            done <<< "$FILES"
          fi
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"

      - name: Read ecosystem version (single source of truth)
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(head -n 1 VERSION | tr -d '\r\n ')" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub release (Rokt-Widget)
    needs: detect
    if: needs.detect.outputs.release == 'true'
    runs-on: macos-latest
    outputs:
      release_version: ${{ steps.version-file.outputs.release-version }}
      release_notes: ${{ steps.extract-release-notes.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get current version
        id: version-file
        run: |
          version_from_file=$(head -n 1 VERSION)
          echo "release-version=$version_from_file" >> $GITHUB_OUTPUT

      - name: Get changelog content
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@273da39a24fb7db106a35526c8162815faffd31d # v3.1.0
        with:
          changelog_file: CHANGELOG.md
          release_notes_file: ${{ steps.version-file.outputs.release-version }}.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version-file.outputs.release-version }}
          name: Release ${{ steps.version-file.outputs.release-version }}
          make_latest: ${{ github.ref_name == 'main' }}
          body: |
            Release ${{ steps.version-file.outputs.release-version }}
            ## Changelog
            ${{ steps.extract-release-notes.outputs.release_notes }}

      - name: Upload release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: ${{ steps.version-file.outputs.release-version }}.md

  upload-xcframework:
    needs: [detect, create-release]
    if: needs.detect.outputs.release == 'true' && needs.create-release.result == 'success'
    runs-on: macos-latest-xlarge
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build XCFramework
        run: ./scripts/build_xcframework_zip.sh

      - name: Upload XCFramework to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.create-release.outputs.release_version }}
          files: vendor/Rokt_Widget.xcframework.zip

  load-matrix:
    name: Load Packages matrix
    needs: detect
    if: needs.detect.outputs.release == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: Packages/matrix.json
          sparse-checkout-cone-mode: false
      - id: set
        run: echo "matrix=$(jq -c . Packages/matrix.json)" >> "$GITHUB_OUTPUT"

  # One job per row in Packages/matrix.json (subtree split → push → GitHub release on mirror).
  mirror-package:
    name: Mirror ${{ matrix.pkg.name }}
    needs: [detect, create-release, load-matrix]
    if: needs.detect.outputs.release == 'true' && needs.create-release.result == 'success'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SDK_RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ matrix.pkg.dest_org }}
          repositories: ${{ matrix.pkg.dest_repo }}
          permission-contents: write

      - name: Subtree split and push
        id: mirror
        shell: bash
        env:
          DEST_ORG: ${{ matrix.pkg.dest_org }}
          DEST_REPO: ${{ matrix.pkg.dest_repo }}
          LOCAL_PATH: ${{ matrix.pkg.local_path }}
          PKG_NAME: ${{ matrix.pkg.name }}
          TOKEN: ${{ steps.generate-token.outputs.token }}
          FORCE_PUSH: ${{ matrix.pkg.mirror_force_push_main }}
        run: |
          set -euo pipefail
          SPLIT_BRANCH="split/${PKG_NAME}"
          git subtree split --prefix "${LOCAL_PATH}" -b "${SPLIT_BRANCH}"
          DEST_URL="https://x-access-token:${TOKEN}@github.com/${DEST_ORG}/${DEST_REPO}.git"
          if [[ "${FORCE_PUSH}" == "true" ]]; then
            git push --force "${DEST_URL}" "${SPLIT_BRANCH}:main"
          else
            git push "${DEST_URL}" "${SPLIT_BRANCH}:main"
          fi
          echo "sha=$(git rev-parse "${SPLIT_BRANCH}")" >> "$GITHUB_OUTPUT"

      - name: Extract release notes for mirror
        id: pkg-notes
        uses: ffurrer2/extract-release-notes@273da39a24fb7db106a35526c8162815faffd31d # v3.1.0
        with:
          changelog_file: ${{ matrix.pkg.changelog_file }}
          release_notes_file: mirror-${{ matrix.pkg.name }}-${{ needs.detect.outputs.version }}.md

      - name: GitHub release on mirror
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ needs.detect.outputs.version }}
          commit: ${{ steps.mirror.outputs.sha }}
          owner: ${{ matrix.pkg.dest_org }}
          repo: ${{ matrix.pkg.dest_repo }}
          token: ${{ steps.generate-token.outputs.token }}
          body: |
            Rokt iOS ecosystem release **${{ needs.detect.outputs.version }}** (mirrored from [rokt-sdk-ios](https://github.com/ROKT/rokt-sdk-ios)).

            ${{ steps.pkg-notes.outputs.release_notes }}

  publish-mirrored-podspecs:
    name: Publish mirrored packages to CocoaPods
    needs: [detect, create-release, load-matrix, mirror-package]
    if: >
      needs.detect.outputs.release == 'true' &&
      needs.create-release.result == 'success' &&
      needs.mirror-package.result == 'success'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Trunk push (order from matrix)
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          set +e
          set -uo pipefail
          . scripts/pod_push.sh
          while IFS= read -r row; do
            spec=$(echo "$row" | jq -r .podspec)
            echo "Publishing ${spec}..."
            trunk_push_with_retries "$spec" || exit 1
          done < <(jq -c 'sort_by(.cocoapods_publish_order)[]' Packages/matrix.json)

  publish-cocoapods-rokt-widget:
    name: Publish Rokt-Widget to CocoaPods
    needs: [detect, create-release, publish-mirrored-podspecs]
    if: >
      needs.detect.outputs.release == 'true' &&
      needs.create-release.result == 'success' &&
      needs.publish-mirrored-podspecs.result == 'success'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Wait for mirrored pods on trunk (matrix order)
        run: |
          set -euo pipefail
          V=$(head -n 1 VERSION | tr -d '\r\n ')
          . scripts/pod_push.sh
          while IFS= read -r row; do
            pod=$(echo "$row" | jq -r .pod_trunk_name)
            wait_for_pod_version_on_trunk "$pod" "$V" 60
          done < <(jq -c 'sort_by(.cocoapods_publish_order)[]' Packages/matrix.json)

      - name: Validate Podspec
        run: pod spec lint Rokt-Widget.podspec --allow-warnings --verbose

      - name: Publish to CocoaPods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          set +e
          set -uo pipefail
          . scripts/pod_push.sh
          trunk_push_with_retries Rokt-Widget.podspec || exit 1

  upload-release-notes:
    needs: [detect, create-release]
    if: github.ref_name == 'main' && needs.detect.outputs.release == 'true' && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SDK_RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            rokt-docs

      - name: Checkout rokt-docs
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ROKT/rokt-docs
          token: ${{ steps.generate_token.outputs.token }}
          ref: main
          persist-credentials: false

      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes
          path: ./

      - name: Move release notes to docs
        run: |
          mv ${{ needs.create-release.outputs.release_version }}.md changelogs/ios/${{ needs.create-release.outputs.release_version }}.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: Update iOS SDK Release Notes
          branch: update-ios-sdk-release-notes-${{ needs.create-release.outputs.release_version }}
          title: NOJIRA - Update iOS SDK Release Notes
          base: main
          body: |
            # Update iOS SDK Release Notes

            iOS SDK version ${{ needs.create-release.outputs.release_version }} has been released.

            Please review and merge the PR to update the release notes.
          labels: |
            chore

  trigger-demo-app-release:
    needs: [detect, create-release, publish-cocoapods-rokt-widget]
    if: >
      github.ref_name == 'main' &&
      needs.detect.outputs.release == 'true' &&
      needs.create-release.result == 'success' &&
      needs.publish-cocoapods-rokt-widget.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SDK_RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: rokt-demo-ios

      - name: Dispatch Event
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repository: ROKT/rokt-demo-ios
          event-type: release-build
          client-payload: |
            {
              "version_name": "${{ needs.create-release.outputs.release_version }}",
              "release_notes": ${{ toJSON(needs.create-release.outputs.release_notes) }}
            }
