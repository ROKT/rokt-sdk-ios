name: Release – Draft

on:
  workflow_dispatch: # checkov:skip=CKV_GHA_7
    inputs:
      bump-type:
        description: Specify if the version should be bumped as patch, minor, or major
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.2"

      - name: Get current ecosystem version
        id: version-file
        run: |
          version_from_file=$(head -n 1 VERSION)
          echo "release-version=$version_from_file" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump-version
        uses: actions-ecosystem/action-bump-semver@34e334551143a5301f38c830e44a22273c6ff5c5 # v1.0.0
        with:
          current_version: ${{ steps.version-file.outputs.release-version }}
          level: ${{ github.event.inputs.bump-type || 'patch' }}

      - name: Write VERSION (root and mirrored packages)
        run: |
          version="${{ steps.bump-version.outputs.new_version }}"
          echo "$version" > VERSION
          echo "$version" > Packages/rokt-ux-helper-ios/VERSION
          echo "$version" > Packages/rokt-payment-extension-ios/VERSION

      - name: Update library version in source
        run: |
          version="${{ steps.bump-version.outputs.new_version }}"
          sed -i '' "s/libraryVersion = \".*\"/libraryVersion = \"${version}\"/" ./Sources/Rokt_Widget/Constants/Constants.swift

      - name: Update all podspec versions
        run: |
          version="${{ steps.bump-version.outputs.new_version }}"
          for podspec in Rokt-Widget.podspec Packages/rokt-ux-helper-ios/RoktUXHelper.podspec Packages/rokt-payment-extension-ios/RoktPaymentExtension.podspec; do
            sed -i '' "s/s\.version[[:space:]]*=[[:space:]]*'[0-9.]*'/s.version          = '${version}'/" "$podspec"
            sed -i '' "s/s\.version[[:space:]]*=[[:space:]]*\"[0-9.]*\"/s.version          = \"${version}\"/" "$podspec"
          done

      - name: Generate changelog from git history
        id: changelog
        uses: ROKT/rokt-workflows/actions/generate-changelog@main
        with:
          version: ${{ steps.bump-version.outputs.new_version }}
          changelog-path: CHANGELOG.md
          kits-path: Packages

      - name: Create release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "Prepare release ${{ steps.bump-version.outputs.new_version }}"
          branch: release/${{ steps.bump-version.outputs.new_version }}
          title: "Release ${{ steps.bump-version.outputs.new_version }}"
          base: ${{ github.ref_name }}
          body: |
            Ecosystem release **${{ steps.bump-version.outputs.new_version }}** — same version for `Rokt-Widget`, `RoktUXHelper`, and `RoktPaymentExtension` (root `VERSION`, mirrored package `VERSION` files, and all podspecs).

            ## Changelog
            ${{ steps.changelog.outputs.release-notes }}
