name: Pull Request

on:
  pull_request:
  push:
    branches:
      - main
      - workstation/*

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  load-package-matrix:
    name: Load Packages matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: Packages/matrix.json
          sparse-checkout-cone-mode: false

      - name: Set matrix output
        id: set
        run: |
          echo "matrix=$(jq -c '[.[] | {path: .local_path}]' Packages/matrix.json)" >> "$GITHUB_OUTPUT"

  trunk-check:
    name: Trunk Check
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Trunk Check
        uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1
        with:
          check-mode: all

  podspec-lint:
    name: Podspec Lint
    runs-on: macos-latest
    needs: trunk-check
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Lint podspec
        run: pod lib lint Rokt-Widget.podspec --allow-warnings --verbose

  unit-test:
    name: SPM Unit Tests
    runs-on: macos-latest-xlarge
    needs: trunk-check
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Rokt-Widget \
            -destination 'platform=iOS Simulator,name=iPhone 16e,OS=latest' \
            -enableCodeCoverage YES \
            -skipPackagePluginValidation \
            -retry-tests-on-failure \
            -resultBundlePath TestResult.xcresult

      - name: Install xcresultparser
        if: always()
        run: brew install xcresultparser

      - name: Process coverage report
        if: always()
        run: |
          xcresultparser --output-format cobertura TestResult.xcresult --project-root "$(pwd)" > "coverage.xml"

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: TestResult.xcresult
          path: TestResult.xcresult

  package-unit-tests:
    name: Package SPM Tests (${{ matrix.package.path }})
    runs-on: macos-latest-xlarge
    needs: [trunk-check, load-package-matrix]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.load-package-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - name: Resolve SPM dependencies
        run: swift package resolve --package-path "${{ matrix.package.path }}"

      - name: Run package unit tests
        run: |
          set -euo pipefail
          PKG_ROOT="${GITHUB_WORKSPACE}/${{ matrix.package.path }}"
          cd "$PKG_ROOT"

          PACKAGE=$(grep -E '^\s*name:' Package.swift | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          LIB_COUNT=$(grep -c '\.library' Package.swift || true)
          if [ "${LIB_COUNT:-0}" -gt 1 ]; then
            SCHEME="${PACKAGE}-Package"
          else
            SCHEME="$PACKAGE"
          fi
          echo "Testing scheme: ${SCHEME} in ${PKG_ROOT}"

          if compgen -G ./*.xcodeproj > /dev/null 2>&1; then
            for xc in ./*.xcodeproj; do
              [ -d "$xc" ] && mv "$xc" "${xc}.bak"
            done
            restore_xcodeproj() {
              for xc in ./*.xcodeproj.bak; do
                [ -d "$xc" ] && mv "$xc" "${xc%.bak}"
              done
            }
            trap restore_xcodeproj EXIT
          fi

          DERIVED="${GITHUB_WORKSPACE}/.derived-data-$(echo "${{ matrix.package.path }}" | tr / -)"
          rm -rf "$DERIVED"
          mkdir -p "$DERIVED"

          # Expose coverage artifacts to later steps before running tests so the
          # upload (if: always()) still has them when tests fail.
          echo "PKG_FLAG=$(basename "${{ matrix.package.path }}")" >> "$GITHUB_ENV"
          echo "PKG_XCRESULT=${DERIVED}/Tests.xcresult" >> "$GITHUB_ENV"

          xcodebuild test \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16e,OS=latest' \
            -derivedDataPath "$DERIVED" \
            -resultBundlePath "${DERIVED}/Tests.xcresult" \
            -enableCodeCoverage YES \
            -skipPackagePluginValidation \
            -retry-tests-on-failure \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install xcresultparser
        if: always()
        run: brew install xcresultparser

      - name: Process coverage report
        if: always()
        run: |
          xcresultparser --output-format cobertura "$PKG_XCRESULT" --project-root "$GITHUB_WORKSPACE" > "package-coverage.xml"

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./package-coverage.xml
          flags: ${{ env.PKG_FLAG }}

  ui-test:
    name: UI Tests
    runs-on: macos-latest-xlarge
    needs: trunk-check
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project Example/rokt.xcodeproj \
            -scheme rokt-Example-MOCK \
            -destination 'platform=iOS Simulator,name=iPhone 16e,OS=latest' \
            -enableCodeCoverage YES \
            -skipPackagePluginValidation \
            -resultBundlePath UiTestResult.xcresult \
            -retry-tests-on-failure

      - name: Install xcresultparser
        if: always()
        run: brew install xcresultparser

      - name: Process coverage report
        if: always()
        run: |
          xcresultparser --output-format cobertura UiTestResult.xcresult --project-root "$(pwd)" > "ui-coverage.xml"

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./ui-coverage.xml
          flags: ui-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: UiTestResult.xcresult
          path: UiTestResult.xcresult

  periphery-scan:
    name: Periphery Scan
    runs-on: macos-latest-xlarge
    needs: trunk-check
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - name: Install Periphery
        run: brew install periphery

      - name: Build Example App
        run: |
          xcodebuild -project "Example/rokt.xcodeproj" -scheme "rokt-Example" -destination 'platform=iOS Simulator,name=iPhone 16e,OS=latest' -derivedDataPath "DerivedData-periphery" -quiet build CODE_SIGNING_ALLOWED="NO" ENABLE_BITCODE="NO" DEBUG_INFORMATION_FORMAT="dwarf" COMPILER_INDEX_STORE_ENABLE="YES" INDEX_ENABLE_DATA_STORE="YES"

      - name: Run Periphery Scan
        run: periphery scan --format github-actions

  size-report:
    name: SDK Size Report
    needs: trunk-check
    uses: ./.github/workflows/ci-size-report.yml
    permissions:
      contents: read
      pull-requests: write

  pr-notify:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    name: Notify GChat
    needs: [unit-test, ui-test, package-unit-tests, periphery-scan]
    uses: ROKT/rokt-workflows/.github/workflows/oss_pr_opened_notification.yml@93d6833818312c13d472e69050e2f0560b31076e # main
    permissions:
      contents: read
      id-token: write
    secrets:
      gchat_webhook: ${{ secrets.GCHAT_PRS_MOBILE_INTEGRATION_CHANNEL_WEBHOOK }}
