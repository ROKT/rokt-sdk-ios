name: Run unit tests
description: Action runs `xcodebuild test` on xcode 16.x

inputs:
  codecov-token:
    description: Codecov token
    required: false

runs:
  using: composite
  steps:
    - name: Set up Xcode 16
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: 26.2

    - name: Setup iOS Simulator
      uses: futureware-tech/simulator-action@dab10d813144ef59b48d401cd95da151222ef8cd # v4
      id: simulator
      with:
        model: iPhone 16
        os: iOS
        os_version: ">=18.0"
        wait_for_boot: true
        shutdown_after_job: true

    - name: Run unit tests
      env:
        TEST_RUNNER_SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/snapshot-failures
      run: >
        set -o pipefail &&
        xcodebuild -skipPackagePluginValidation -scheme RoktUXHelper
        -destination 'id=${{ steps.simulator.outputs.udid }}'
        -enableCodeCoverage YES -derivedDataPath DerivedData clean build test
        | xcbeautify --renderer github-actions
      shell: bash

    - name: Upload snapshot failure diffs
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: snapshot-failures
        path: snapshot-failures/
        if-no-files-found: warn

    - name: Install xcresultparser
      if: ${{ inputs.codecov-token != '' }}
      run: brew install xcresultparser
      shell: bash

    - name: Process coverage report
      if: ${{ inputs.codecov-token != '' }}
      shell: bash
      run: |
        mkdir -p artifacts
        xcresultparser --output-format cobertura "$(find DerivedData/Logs/Test -name '*.xcresult' | head -n 1)" --project-root "$(pwd)" > "artifacts/coverage.xml"

    - name: Upload coverage report
      if: ${{ inputs.codecov-token != '' }}
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        token: ${{ inputs.codecov-token }}
        files: ./artifacts/coverage.xml
        flags: unittests
