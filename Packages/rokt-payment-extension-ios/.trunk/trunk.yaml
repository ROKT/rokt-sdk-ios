---
# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see
# https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
lint:
  enabled:
    - checkov@3.2.513
    - osv-scanner@2.3.5
    - trufflehog@3.94.1
    - swiftformat@0.55.5
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.1
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - swiftlint@0.58.2
    - actionlint@1.7.12
    - yamllint@1.38.0
  ignore:
    - linters: [ALL]
      paths:
        - Tests/**
actions:
  enabled:
    - trunk-check-pre-push
    - trunk-announce
    - trunk-fmt-pre-commit
    - trunk-check-pre-commit
    - trunk-upgrade-available
