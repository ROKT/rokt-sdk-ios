---
name: Maintenance – Trunk Upgrade

on:
  workflow_call:
  schedule:
    - cron: 0 0 1 * *
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-call-upgrade:
    runs-on: ubuntu-latest
    outputs:
      generated-token: ${{ steps.generate-token.outputs.token }}
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SDK_RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

  trunk-upgrade:
    needs: generate-and-call-upgrade
    name: Run trunk upgrade
    uses: ROKT/rokt-workflows/.github/workflows/trunk-upgrade.yml@1859338d7c2c2b873233505c751acbf09fb218d5 # main
    with:
      token: ${{ needs.generate-and-call-upgrade.outputs.generated-token }}

  trunk-check:
    name: Trunk code check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trunk Check
        uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1
        with:
          check-mode: all
